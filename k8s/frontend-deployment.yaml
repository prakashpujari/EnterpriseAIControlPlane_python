apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-ai-frontend
  labels:
    app: enterprise-ai-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-ai-frontend
  template:
    metadata:
      labels:
        app: enterprise-ai-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/enterprise-ai/frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              value: "http://enterprise-ai-backend:80"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-ai-frontend
  labels:
    app: enterprise-ai-frontend
spec:
  selector:
    app: enterprise-ai-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enterprise-ai-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: ai.enterprise.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: enterprise-ai-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: enterprise-ai-backend
                port:
                  number: 80